name: Deploy (etl-func)
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch: {}

jobs:
  etl_func_deploy:
    uses: pagopa/dx/.github/workflows/release-azure-appsvc-v1.yaml@7e6e88cf29984e3a54589e1ed51a335e016b3f47
    name: Deploy
    secrets: inherit
    with:
      workspace_name: etl-func
      environment: app-prod
      resource_group_name: io-p-itn-com-rg-01
