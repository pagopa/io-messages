openapi: 3.0.3
info:
  title: IO Messages - RC App - Internal API
  version: 0.1.0
  description: Internal API for reading Remote Content configurations.

paths:
  /api/internal/rc-configurations/{configurationId}:
    get:
      operationId: getRcConfiguration
      summary: Get a remote-content configuration by configurationId.
      description: >-
        Returns the remote-content configuration identified by the provided
        configurationId (ULID).
      parameters:
        - name: configurationId
          in: path
          required: true
          description: ULID identifier of the remote-content configuration.
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "200":
          description: The remote-content configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcConfigurationResponse"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Configuration not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "429":
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    Ulid:
      type: string
      pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
      example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
    RcConfigurationResponse:
      type: object
      description: A remote-content configuration.
      properties:
        configurationId:
          type: string
          format: ulid
          description: ULID identifier of the configuration.
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        description:
          type: string
          description: Human-readable description of the configuration.
        disableLollipopFor:
          type: array
          description: List of fiscal codes for which Lollipop is disabled.
          items:
            $ref: "#/components/schemas/FiscalCode"
        hasPrecondition:
          $ref: "#/components/schemas/HasPrecondition"
        id:
          type: string
          description: Internal document identifier.
        isLollipopEnabled:
          type: boolean
          description: Whether Lollipop signing is enabled for this configuration.
        name:
          type: string
          description: Name of the configuration.
        prodEnvironment:
          $ref: "#/components/schemas/RcEnvironmentConfig"
        testEnvironment:
          $ref: "#/components/schemas/RcTestEnvironmentConfig"
        userId:
          type: string
          description: Identifier of the user who owns this configuration.
      required:
        - configurationId
        - description
        - disableLollipopFor
        - hasPrecondition
        - id
        - isLollipopEnabled
        - name
        - userId

    RcEnvironmentConfig:
      type: object
      description: Environment configuration for a remote-content service.
      properties:
        baseUrl:
          type: string
          description: Base URL of the remote-content service.
        detailsAuthentication:
          $ref: "#/components/schemas/RcAuthenticationConfig"
      required:
        - baseUrl
        - detailsAuthentication

    RcTestEnvironmentConfig:
      allOf:
        - $ref: "#/components/schemas/RcEnvironmentConfig"
        - type: object
          description: Environment configuration for testing, with a list of allowed test users.
          properties:
            testUsers:
              type: array
              description: Fiscal codes of users allowed to use this test environment.
              items:
                $ref: "#/components/schemas/FiscalCode"
          required:
            - testUsers

    RcAuthenticationConfig:
      type: object
      description: Authentication configuration for a remote-content service.
      properties:
        headerKeyName:
          type: string
          description: Name of the HTTP header used to pass the authentication key.
        key:
          type: string
          description: Authentication key value.
        type:
          type: string
          description: Authentication type (e.g. API_KEY, Bearer).
        cert:
          $ref: "#/components/schemas/RcClientCert"
      required:
        - headerKeyName
        - key
        - type

    RcClientCert:
      type: object
      description: Mutual TLS certificate configuration.
      properties:
        clientCert:
          type: string
          description: PEM-encoded client certificate.
        clientKey:
          type: string
          description: PEM-encoded client private key.
        serverCa:
          type: string
          description: PEM-encoded server CA certificate.
      required:
        - clientCert
        - clientKey
        - serverCa

    HasPrecondition:
      type: string
      description: >-
        Controls when the app must show a precondition screen before opening
        the message.
      enum:
        - ALWAYS
        - ONCE
        - NEVER

    FiscalCode:
      type: string
      description: Italian fiscal code of a citizen.
      pattern: "^[A-Z]{6}[0-9LMNPQRSTUV]{2}[ABCDEHLMPRST]{1}[0-9LMNPQRSTUV]{2}[A-Z]{1}[0-9LMNPQRSTUV]{3}[A-Z]{1}$"
      example: SPNDNL80R13C555X

    ProblemDetails:
      type: object
      description: RFC 7807 problem details object.
      properties:
        type:
          type: string
          format: uri
          description: >-
            An absolute URI that identifies the problem type. When dereferenced,
            it SHOULD provide human-readable documentation for the problem type.
          default: about:blank
          example: https://example.com/problem/constraint-violation
        title:
          type: string
          description: >-
            A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          description: The HTTP status code.
          minimum: 100
          maximum: 599
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Configuration not found
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of the problem.
